name: CI

# Testovací stupeň. Běží na každé PR i na push do main a nepotřebuje žádné
# Cloudflare klíče: vitest spouští Worker v lokálním workerd. Filtr `workers/**`
# hlídá, aby změny jen v Django `backend/` tenhle běh nespouštěly (repo má dvě
# implementace, viz CLAUDE.md).
on:
  pull_request:
    paths: ["pixel-pantry/workers/**", ".github/workflows/ci.yml"]
  push:
    branches: [main]
    paths: ["pixel-pantry/workers/**", ".github/workflows/ci.yml"]
  workflow_dispatch:

defaults:
  run:
    working-directory: pixel-pantry/workers

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: pixel-pantry/workers/package-lock.json
      - run: npm ci
      # worker-configuration.d.ts je generovaný (gitignored), takže v čistém
      # checkoutu chybí a tsconfig `types` ho vyžaduje - vygeneruj z wrangler.jsonc
      # (offline, bez cloud klíčů), jinak typecheck spadne na TS2688.
      - run: npx wrangler types
      - run: npm run typecheck
      - run: npm test
