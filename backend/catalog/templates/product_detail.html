{% load static %}
<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produkt — Pixel Pantry</title>
  <link rel="stylesheet" href="{% static 'catalog/styles.css' %}">
</head>
<body
  data-product-slug="{{ slug }}"
  data-user-authenticated="{% if user.is_authenticated %}true{% else %}false{% endif %}"
>
  {% csrf_token %}

  <header class="site-header">
    <div class="logo">
      <a href="/" class="logo-emoji">🕹️</a>
      <span class="logo-text">Pixel Pantry</span>
    </div>
    <nav class="main-nav">
      <a href="/">Zpět do obchodu</a>
      {% if user.is_authenticated %}
        <span>Ahoj, {{ user.username }}</span>
        <a href="{% url 'logout' %}">Odhlásit</a>
      {% else %}
        <a href="{% url 'login' %}">Přihlásit</a>
      {% endif %}
    </nav>
    <a href="/pokladna/" class="cart">
      <span class="cart-emoji">🛒</span>
      <span id="cart-count">0</span>
    </a>
  </header>

  <main class="product-detail-section" id="product-detail">
    <p class="loading-message">Načítám produkt…</p>
  </main>

  <script src="{% static 'catalog/app.js' %}"></script>
</body>
</html>
